# 可复用的 Rust CI 工作流
# 用法:
# jobs:
#   ci:
#     uses: ./.github/workflows/reusable-rust-ci.yml
#     with:
#       rust-version: stable
#       run-tests: true
#       run-clippy: true
#       run-fmt: true

name: Reusable Rust CI

on:
  workflow_call:
    inputs:
      rust-version:
        description: 'Rust toolchain version'
        required: false
        default: 'stable'
        type: string
      run-tests:
        description: 'Run tests'
        required: false
        default: true
        type: boolean
      run-clippy:
        description: 'Run clippy'
        required: false
        default: true
        type: boolean
      run-fmt:
        description: 'Run rustfmt check'
        required: false
        default: true
        type: boolean
      run-lsp:
        description: 'Run LSP smoke test'
        required: false
        default: false
        type: boolean
      test-command:
        description: 'Custom test command'
        required: false
        default: 'cargo test --lib'
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --all-targets

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: ${{ inputs.run-tests }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: ${{ inputs.test-command }}

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    if: ${{ inputs.run-fmt }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    if: ${{ inputs.run-clippy }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  lsp:
    name: LSP Smoke Test
    runs-on: ubuntu-latest
    if: ${{ inputs.run-lsp }}
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build LSP server
        run: cargo build --release --bin mora-lsp

      - name: Build LSP smoke test
        run: cargo build --release --example lsp_smoke

      - name: Run LSP smoke test
        run: ./target/release/examples/lsp_smoke ./target/release/mora-lsp
